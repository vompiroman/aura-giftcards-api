name: Tests

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @workspace/api-server test:integration

  e2e:
    runs-on: ubuntu-latest
    needs: integration
    env:
      API_BASE: ${{ secrets.E2E_API_BASE }}
      SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.E2E_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.E2E_SUPABASE_SERVICE_ROLE_KEY }}
      WEBHOOK_SECRET: ${{ secrets.E2E_WEBHOOK_SECRET }}
      TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
      TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
      ITEM_NAME: "Netflix 1 mois"
      ITEM_SERVICE: "Netflix"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @workspace/api-server test:e2e:ci
